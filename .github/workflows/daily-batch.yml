name: Test Cron

on:
  schedule:
    # Three videos a day, one per run. Times are Asia/Ho_Chi_Minh (UTC+7);
    # GitHub schedules in UTC and may delay a run by 5-15 min under load.

    # 21:33 UTC = 04:33 VN (next day — due-today resolves to that VN date)
    - cron: "33 21 * * *"

    # 01:33 UTC = 08:33 VN
    - cron: "33 1 * * *"

    # 09:33 UTC = 16:33 VN
    - cron: "33 9 * * *"

    # 15:03 UTC = 22:03 VN — retry whatever failed, after all three renders
    - cron: "3 15 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Batch select mode"
        type: choice
        options:
          - due-today
          - pending
          - failed
          - failed-today
          - publish-failed
          - publish-failed-today
        default: due-today

concurrency:
  group: daily-video-batch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      PUBLISH_PLATFORMS: drive,telegram

      GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
      GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
      GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}

      IMAGE_PROVIDER: chatgpt
      OPENAI_IMAGE_API_KEY: ${{ secrets.OPENAI_IMAGE_API_KEY }}
      OPENAI_IMAGE_MODEL: gpt-image-2
      OPENAI_IMAGE_SIZE: 864x1536
      OPENAI_IMAGE_QUALITY: low
      OPENAI_IMAGE_PROMPT_MODE: compact

      CAPTION_MODE: none

      JOBS_CSV: jobs.csv

      MUSIC_VOLUME: 0.35
      NARRATION_VOLUME: 1.2


    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Sync with main
        run: |
          git pull --rebase origin main


      - name: Resolve batch mode
        id: mode
        shell: bash
        run: |
          # due-today takes one row per run so the three daily slots produce three
          # videos; retry modes clear the whole backlog in one go.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            select="${{ inputs.mode }}"
          else
            case "${{ github.event.schedule }}" in
              "3 15 * * *")
                select="failed"
                ;;

              *)
                select="due-today"
                ;;
            esac
          fi

          if [ "$select" = "due-today" ]; then
            max_jobs=1
          else
            max_jobs=0
          fi

          echo "select=$select" >> "$GITHUB_OUTPUT"
          echo "max_jobs=$max_jobs" >> "$GITHUB_OUTPUT"


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip


      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: remotion/package-lock.json


      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0 \
            libgtk-3-0


      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt


      - name: Install Remotion dependencies
        working-directory: remotion
        run: |
          npm ci


      - name: Cache Chrome Headless Shell
        uses: actions/cache@v6
        with:
          path: remotion/node_modules/.remotion
          key: remotion-chrome-${{ runner.os }}-${{ hashFiles('remotion/package-lock.json') }}


      - name: Ensure Chrome Headless Shell
        working-directory: remotion
        run: |
          npx remotion browser ensure


      - name: Ensure asset directories
        shell: bash
        run: |
          mkdir -p assets/jobs
          mkdir -p output/final

          # Cho Git lưu folder rỗng
          touch assets/jobs/.gitkeep


      - name: Repair today's failed renders
        # Each slot checks the day before adding to it: a job an earlier slot failed
        # is retried here, so a bad 04:33 no longer waits until the 22:03 sweep.
        # Capped at --max-attempts runs per row, and best-effort — a row that fails
        # again must not stop this slot from rendering its own job.
        if: steps.mode.outputs.select == 'due-today'
        continue-on-error: true
        run: >
          python batch_runner.py
          --csv jobs.csv
          --select failed-today
          --max-jobs 0
          --publish

      - name: Repair today's failed publishes
        # Renders that succeeded but did not reach every platform. Re-renders from
        # cached assets (no LLM or image API calls) and re-publishes only what failed.
        if: steps.mode.outputs.select == 'due-today'
        continue-on-error: true
        run: >
          python batch_runner.py
          --csv jobs.csv
          --select publish-failed-today
          --max-jobs 0

      - name: Run daily batch
        run: >
          python batch_runner.py
          --csv jobs.csv
          --select ${{ steps.mode.outputs.select }}
          --max-jobs ${{ steps.mode.outputs.max_jobs }}
          --publish


      - name: Retry failed publishes
        # Rows whose render succeeded but publish did not. Re-renders from cached
        # job assets and re-publishes only the platforms recorded in publish_status.
        if: always() && steps.mode.outputs.select == 'failed'
        run: >
          python batch_runner.py
          --csv jobs.csv
          --select publish-failed
          --max-jobs 0


      - name: Fill job assets for upcoming days
        # Runs AFTER the video so a future job's script/image failure can never block
        # today's render — the batch fills gaps for the due job on its own. Pending
        # rows with created_at >= today VN; libraries already complete are skipped.
        # Best-effort: a failure here shows orange but must not fail the run.
        if: always()
        continue-on-error: true
        run: >
          python scripts/pregenerate_job_assets.py
          --csv jobs.csv
          --from-today
          --notify


      - name: Notify Telegram on failure
        if: failure()
        run: |
          python core/telegram_notify.py send-message \
          "Daily batch failed — check GitHub Actions logs."


      - name: Upload rendered video
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: final-video
          path: |
            output/final/final.mp4
            output/final/pipeline_payload.json
          if-no-files-found: ignore
          retention-days: 7


      - name: Commit updated jobs and assets
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p assets/jobs
          touch assets/jobs/.gitkeep

          git add jobs.csv
          git add assets/jobs   # scenes_draft.json + images/ + usage.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update jobs and cached assets"
            git push origin HEAD:main
          fi
