name: Daily video batch

on:
  schedule:
    # 01:00 UTC = 08:00 UTC+7 — one pending video per day
    - cron: "0 1 * * *"
  workflow_dispatch: {}

# Prevent overlapping runs (a render can outlast the next trigger)
concurrency:
  group: daily-video-batch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      IMAGE_PROVIDER: pollinations
      CAPTION_MODE: none
      JOBS_CSV: jobs.csv
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0 \
            libgtk-3-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: npm ci
        working-directory: remotion

      - name: Run daily batch
        run: python batch_runner.py --csv jobs.csv --max-jobs 1

      - name: Upload rendered video
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: final-video
          path: |
            output/final/final.mp4
            output/final/pipeline_payload.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Commit updated jobs.csv
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.csv
          git diff --staged --quiet || git commit -m "chore: update jobs.csv after daily batch"
          git push
