name: Test Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger
        run: |
          echo "=================================="
          echo "Event: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "UTC Time:"
          date -u
          echo "Local Time:"
          date
          echo "Cron is working!"
          echo "=================================="
