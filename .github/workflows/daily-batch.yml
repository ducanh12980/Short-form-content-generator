name: Test Cron

on:
  schedule:
    # Ví dụ đặt chạy lúc 16:05 giờ VN = 09:05 giờ UTC
    - cron: "9 9 * * *"
    - cron: "9 10 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger
        run: |
          echo "=================================="
          echo "Event: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "UTC Time:"
          date -u
          echo "Local Time:"
          date
          echo "Cron is working!"
          echo "=================================="
